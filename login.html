<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - GENZTECH MARKETING</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f7;
            background-image:
                radial-gradient(at 20% 0%, hsla(210, 100%, 92%, 0.8) 0, transparent 50%),
                radial-gradient(at 80% 0%, hsla(230, 100%, 90%, 0.6) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(200, 100%, 93%, 0.7) 0, transparent 50%);
            background-attachment: fixed;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 48px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow:
                0 0 0 0.5px rgba(0, 0, 0, 0.04),
                0 12px 40px rgba(0, 0, 0, 0.06),
                0 4px 16px rgba(0, 0, 0, 0.03);
            animation: fadeIn 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        /* Loading bar */
        .loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #0071e3, transparent);
            width: 100%;
            transform: translateX(-100%);
            display: none;
        }

        .loader-bar.active {
            display: block;
            animation: loading 1.5s infinite linear;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Logo */
        .logo-login {
            display: inline-block;
            font-size: 28px;
            font-weight: 700;
            text-decoration: none;
            color: #1d1d1f;
            letter-spacing: -0.04em;
            margin-bottom: 32px;
        }

        .logo-login span {
            color: #0071e3;
        }

        /* Titles */
        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Divider */
        .divider {
            margin: 28px 0;
            position: relative;
            height: 1px;
            background: rgba(0, 0, 0, 0.06);
        }

        .divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.82);
            padding: 0 14px;
            color: #86868b;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Form inputs */
        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .input-group input {
            width: 100%;
            background: #ffffff;
            border: 1.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 13px 16px;
            color: #1d1d1f;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.25s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
        }

        .input-group input::placeholder {
            color: #c7c7cc;
        }

        /* Login button - ĐẬM & NỔI BẬT */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: #0062cc;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 98, 204, 0.35);
        }

        .btn-submit:active {
            transform: scale(0.98) translateY(0);
            box-shadow: 0 4px 12px rgba(0, 98, 204, 0.25);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Status messages */
        .status-msg {
            margin-top: 16px;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 10px;
            display: none;
            animation: fadeIn 0.3s ease-out;
            text-align: left;
        }

        .status-msg.error {
            display: block;
            background: #fff2f2;
            color: #d70015;
            border: 1px solid rgba(215, 0, 21, 0.12);
        }

        .status-msg.success {
            display: block;
            background: #f0faf0;
            color: #248a3d;
            border: 1px solid rgba(36, 138, 61, 0.12);
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin-top: 28px;
            font-size: 13px;
            color: #86868b;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #0071e3;
        }

        /* Footer note */
        .login-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            font-size: 11px;
            color: #aeaeb2;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="loader-bar" id="loader-bar"></div>

            <a href="index.html" class="logo-login"><span>GENZ</span>TECH</a>

            <h2 class="login-title" style="margin-bottom: 40px;">Chào mừng trở lại</h2>




            <div class="input-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" placeholder="Nhập username hoặc email">
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-submit" id="login-btn">Đăng nhập</button>
            <div id="status-msg" class="status-msg"></div>

            <a href="index.html" class="back-link">← Quay lại trang chủ</a>

            <div class="login-footer">
                Bằng việc đăng nhập, bạn đồng ý với <strong>Điều khoản dịch vụ</strong> và <strong>Chính sách bảo mật</strong> của GENZTECH.
            </div>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('login-btn');
        const loaderBar = document.getElementById('loader-bar');
        const statusMsg = document.getElementById('status-msg');

        function showStatus(msg, type) {
            statusMsg.textContent = msg;
            statusMsg.className = 'status-msg ' + type;
        }

        // Enter key support
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
        document.getElementById('username').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        loginBtn.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showStatus('Vui lòng nhập đầy đủ thông tin', 'error');
                return;
            }

            // Reset UI
            showStatus('', '');
            loaderBar.classList.add('active');
            loginBtn.disabled = true;

            try {
                // Determine API URL based on environment
                const baseUrl = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
                    ? "http://localhost:3000/api/login"
                    : "/api/login";

                const response = await fetch(baseUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => {
                        window.location.href = 'ads.html';
                    }, 1000);
                } else {
                    showStatus(data.message || 'Đăng nhập thất bại', 'error');
                    loaderBar.classList.remove('active');
                    loginBtn.disabled = false;
                }
            } catch (err) {
                console.error('Login error:', err);
                showStatus('Có lỗi xảy ra khi kết nối tới máy chủ.', 'error');
                loaderBar.classList.remove('active');
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
